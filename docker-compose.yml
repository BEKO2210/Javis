# Local-development stack: javis-viz + Prometheus + Grafana, all
# wired together so you can scrape `/metrics` and see live charts on
# http://localhost:3000 (Grafana, anonymous-admin login).
#
# Bring it up:
#   docker compose up --build
# Tear it down (preserves volumes):
#   docker compose down
# Wipe volumes too (start fresh):
#   docker compose down -v

services:
  javis-viz:
    build:
      context: .
      dockerfile: Dockerfile
      # Optional sandbox/proxy CA bundle. The Dockerfile reads
      # `--secret id=hostca` if it's present and otherwise falls
      # through cleanly. Compose passes the secret to BuildKit only
      # if the host file actually exists.
      secrets:
        - hostca
    image: javis-viz:local
    container_name: javis-viz
    restart: unless-stopped
    # Persist the brain across container restarts. The binary loads
    # the file at startup if it exists and writes it back on graceful
    # shutdown (SIGTERM → tini → graceful shutdown → save).
    command: ["--snapshot", "/app/data/brain.snapshot.json"]
    ports:
      - "7777:7777"
    environment:
      RUST_LOG: info
      JAVIS_LOG_FORMAT: json
      # Optional: set to a real key to exercise the LLM path.
      # ANTHROPIC_API_KEY: ""
    volumes:
      - javis-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:7777/health"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: javis-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=24h
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - javis-viz

  grafana:
    image: grafana/grafana:11.4.0
    container_name: javis-grafana
    restart: unless-stopped
    environment:
      # Anonymous access for local-dev convenience. Do NOT use these
      # settings in any externally-reachable deployment.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  javis-data:
  prometheus-data:
  grafana-data:

# Build-time secret. Only read during `docker compose build`; the
# resulting image does not contain the file. Useful for sandbox /
# corporate-proxy environments that intercept TLS — point it at the
# host's combined CA bundle.
secrets:
  hostca:
    file: /etc/ssl/certs/ca-certificates.crt
