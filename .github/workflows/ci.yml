name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (zero warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --workspace -- -D warnings

  test:
    name: test (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --release
      - name: Test
        # Pin a single test thread for the long-running multi-region
        # tests so wall-clock variance on shared CI runners doesn't
        # cause flakes. Total wall time stays under the GitHub
        # 6-hour cap by a comfortable margin.
        run: cargo test --workspace --release -- --test-threads=2

  doc-tests:
    name: doc tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --doc

  docs:
    name: cargo doc (zero warnings)
    runs-on: ubuntu-latest
    env:
      # Treat every rustdoc warning as a build failure: broken
      # intra-doc links, invalid codeblock attributes, malformed HTML
      # in doc comments, etc. Keeps the public-API documentation
      # honest even when the source compiles fine.
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  benches:
    name: bench compile-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Only verify the benches *compile*. Running them on a shared
      # GitHub runner produces too much variance to be useful for
      # regression detection — that's why bench numbers in
      # notes/31-* came from local hardware. The compile-check still
      # catches API drift the moment a bench function references a
      # symbol that was renamed or removed.
      - run: cargo bench --workspace --no-run

  deny:
    name: cargo-deny (licenses, advisories, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # Run all four checks. The thresholds and allow-lists are
          # in the repo-root `deny.toml`.
          arguments: --workspace --all-features

  msrv:
    name: msrv (1.86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned MSRV toolchain
        # `rust-version = "1.86"` in Cargo.toml is the contract;
        # this job verifies the workspace still builds and tests
        # green against exactly that toolchain.
        uses: dtolnay/rust-toolchain@1.86
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --locked
      - name: Test
        run: cargo test --workspace --locked -- --test-threads=2
