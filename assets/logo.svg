<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" role="img" aria-label="Javis: Spiking Neural Memory">
  <title>Javis</title>
  <desc>Two anatomical lobes (R1 input cortex on the left, R2 memory cortex on the right with embedded inhibitory cells) connected by spike trails. Wordmark "javis" with the tagline "SPIKING NEURAL MEMORY".</desc>

  <defs>
    <radialGradient id="r1Glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#62d6ff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#62d6ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#62d6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r2Glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd166" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#ffd166" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#62d6ff" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd166" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e6e8ee"/>
      <stop offset="100%" stop-color="#8a93a6"/>
    </linearGradient>
    <filter id="softblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- ============================== R1 lobe ============================ -->
  <g transform="translate(80,110)">
    <circle r="62" fill="url(#r1Glow)"/>
    <!-- 16 nodes, fibonacci-style scatter -->
    <g fill="#62d6ff" filter="url(#softblur)">
      <circle cx="0"   cy="0"   r="3.2"/>
      <circle cx="-28" cy="-12" r="2.6"/>
      <circle cx="22"  cy="-22" r="2.8"/>
      <circle cx="-12" cy="28"  r="2.2"/>
      <circle cx="28"  cy="14"  r="2.4"/>
      <circle cx="-34" cy="6"   r="1.9"/>
      <circle cx="10"  cy="-34" r="1.9"/>
      <circle cx="-20" cy="-30" r="1.6"/>
      <circle cx="32"  cy="-6"  r="1.6"/>
      <circle cx="-30" cy="22"  r="1.5"/>
      <circle cx="14"  cy="32"  r="1.5"/>
      <circle cx="-6"  cy="-18" r="1.3"/>
      <circle cx="6"   cy="14"  r="1.3"/>
      <circle cx="-18" cy="14"  r="1.2"/>
      <circle cx="20"  cy="2"   r="1.2"/>
      <circle cx="-4"  cy="36"  r="1.1"/>
    </g>
  </g>

  <!-- ========================= Inter-region trails ===================== -->
  <g fill="none" stroke="url(#trail)" stroke-width="1.1" opacity="0.85">
    <path d="M 142 88 C 200 72, 280 64, 348 78"/>
    <path d="M 142 110 C 220 110, 300 110, 348 110"/>
    <path d="M 142 132 C 200 152, 280 158, 348 142"/>
    <path d="M 142 100 C 230 90, 300 130, 348 124"/>
    <path d="M 142 120 C 230 130, 300 90, 348 96"/>
  </g>

  <!-- Spike pulses on the trails -->
  <g fill="#ffffff">
    <circle cx="232" cy="80"  r="2.4" opacity="0.95"/>
    <circle cx="278" cy="146" r="2.2" opacity="0.85"/>
    <circle cx="190" cy="118" r="1.8" opacity="0.7"/>
  </g>

  <!-- ============================== R2 lobe ============================ -->
  <g transform="translate(380,110)">
    <circle r="86" fill="url(#r2Glow)"/>
    <!-- 24 excitatory + 6 inhibitory nodes -->
    <g fill="#ffd166" filter="url(#softblur)">
      <circle cx="0"    cy="0"   r="3.4"/>
      <circle cx="-44"  cy="-22" r="3.0"/>
      <circle cx="38"   cy="-30" r="3.0"/>
      <circle cx="-26"  cy="36"  r="2.8"/>
      <circle cx="46"   cy="22"  r="2.8"/>
      <circle cx="-58"  cy="14"  r="2.4"/>
      <circle cx="56"   cy="-8"  r="2.4"/>
      <circle cx="22"   cy="-52" r="2.4"/>
      <circle cx="-16"  cy="-46" r="2.2"/>
      <circle cx="64"   cy="40"  r="2.2"/>
      <circle cx="-50"  cy="-44" r="2.0"/>
      <circle cx="40"   cy="56"  r="2.0"/>
      <circle cx="-66"  cy="-12" r="1.8"/>
      <circle cx="68"   cy="14"  r="1.8"/>
      <circle cx="-30"  cy="-2"  r="1.6"/>
      <circle cx="30"   cy="6"   r="1.6"/>
      <circle cx="-10"  cy="56"  r="1.6"/>
      <circle cx="14"   cy="-18" r="1.5"/>
      <circle cx="-22"  cy="-22" r="1.5"/>
      <circle cx="52"   cy="-46" r="1.4"/>
      <circle cx="-46"  cy="44"  r="1.4"/>
      <circle cx="6"    cy="48"  r="1.3"/>
      <circle cx="-72"  cy="32"  r="1.2"/>
      <circle cx="74"   cy="-32" r="1.2"/>
    </g>
    <!-- Inhibitory cells embedded inside -->
    <g fill="#ff5c8a" filter="url(#softblur)">
      <circle cx="-12" cy="14"  r="2.3"/>
      <circle cx="18"  cy="-8"  r="2.0"/>
      <circle cx="-2"  cy="-30" r="1.8"/>
      <circle cx="32"  cy="32"  r="1.7"/>
      <circle cx="-36" cy="0"   r="1.6"/>
      <circle cx="14"  cy="34"  r="1.5"/>
    </g>
  </g>

  <!-- ============================== Wordmark =========================== -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif">
    <text x="500" y="120" font-size="78" font-weight="800" fill="url(#wordmark)" letter-spacing="-3">javis</text>
    <text x="502" y="150" font-size="11" font-weight="600" fill="#8a93a6" letter-spacing="3.6">SPIKING&#160;&#160;NEURAL&#160;&#160;MEMORY</text>
  </g>
</svg>
